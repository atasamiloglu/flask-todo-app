<!DOCTYPE html>
<html>

<head>
    <title>ToDo App</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark" style="background-color: #2d2d2d;">
        <div class="container">

            <a class="navbar-brand" href="#">📋 ToDo App </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">

                <ul class="navbar-nav ms-auto">

                    <li class="nav-item">
                        <a class="nav-link active" href="{{ url_for('index') }}">
                            🏠 Homepage
                        </a>
                    </li>

                    {% if current_user.is_authenticated %}

                    <li class="nav-item">
                        <span class="nav-link">
                            👋 {{ current_user.username }}
                        </span>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('logout') }}">
                            🚪 Logout
                        </a>
                    </li>

                    {% else %}

                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('login') }}">
                            Login
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('register') }}">
                            Register
                        </a>
                    </li>

                    {% endif %}
                

                </ul>

            </div>

        </div>
    </nav>

    <div class="container">

        <h1 class="text-center mt-5">📝 My Tasks</h1>
        <p class="text-center">Manage your tasks efficiently with our ToDo App.</p>

        <form class="mt-4">
            <div class="input-group">
                <input type="text" class="form-control" placeholder="Add new task...">

                <button class="btn btn-primary" type="submit">
                    Add
                </button>
            </div>
        </form>


    </div>



</body>

</html>
